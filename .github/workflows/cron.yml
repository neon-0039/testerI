name: Misskey Bot Cron

on:
  schedule:
    # 秒単位の指定は不可のため、毎時59分にトリガー
    # GitHubの混雑状況により、数分遅れて実行されるのが一般的です
    - cron: '59 * * * *'
  workflow_dispatch: # 手動実行用ボタン

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          # 404エラー対策として、ライブラリを強制的に最新版にアップグレードします
          python -m pip install --upgrade pip
          pip install --upgrade Misskey.py google-generativeai

      - name: Run bot
        env:
          MK_DOMAIN: ${{ secrets.MK_DOMAIN }}
          MK_TOKEN: ${{ secrets.MK_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python bot.py
